<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Genius Scan Capacitor Demo</title>
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">

  <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0d453b">
</head>
<body>
  <main class="shell">
    <section class="panel hero">
      <h1>Genius Scan SDK</h1>
      <p class="lede">Use the local Capacitor plugin to scan documents or barcodes.</p>

  </main>

  <script src="js/capacitor.js"></script>
  <script src="js/index.js"></script>
